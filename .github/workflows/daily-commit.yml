name: Daily Automated Commit

on:
  schedule:
    - cron: "30 9 * * *"
  workflow_dispatch:

jobs:
  daily-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Git
        run: |
          git config user.name "DevSync Bot"
          git config user.email "22ds2000010@ds.study.iitm.ac.in"

      - name: Daily update by 22ds2000010@ds.study.iitm.ac.in
        run: |
          echo "Last update: $(date)" >> daily-log.txt

      - name: Commit and Push
        run: |
          git add daily-log.txt
          git commit -m "Automated daily commit $(date)" || echo "No changes"
          git push